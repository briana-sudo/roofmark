<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Step 12 partial-completion fix — prevent index.html from being
      cached so operators always fetch the latest hashed-asset references
      after a deploy. Without this, the GitHub Pages default
      `Cache-Control: max-age=600` can leave a tab loading old bundle
      hashes for up to 10 minutes after a deploy. The hashed JS/CSS
      bundles still cache aggressively (their URLs change per build).
    -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!--
      Step 15 — Google Identity Services. Loaded async so it doesn't
      block first paint; the JobRegistryPicker checks `window.google`
      readiness before triggering a sign-in and surfaces a "loading"
      message if the script hasn't arrived yet. Same script + flow as
      roof-inspector / flat-roof-inspector for cross-app SSO via
      shared `kcc_token` localStorage keys.
    -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <title>RoofMark</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
