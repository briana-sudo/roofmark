<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RoofMark — Section 7.A Functional (Photo Viewport Architecture)</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #0d1117; color: #e6edf3; padding: 16px; }
  h1 { margin: 0 0 12px; font-size: 18px; }
  .summary { font-family: "SF Mono", Consolas, monospace; font-size: 12px; }
  .pass { color: #3fb950; }
  .fail { color: #f85149; }
  .row { padding: 2px 0; }
</style>
</head>
<body>
<h1>RoofMark — Section 7.A Block Test (Viewport Math + Pan/Zoom)</h1>
<div class="summary" id="summary"></div>
<script>
/*
  Section 7.A block test — pure-JS reproduction of the viewport math
  in `src/store/viewport.js`. Verifies:
    - photoNormToCanvas and canvasToPhotoNorm round-trip
    - computeFitZoom + computeFitViewport produce the right zoom + center
    - clampPan keeps ≥10% of photo visible at the edges
    - zoomAtCursor keeps the photo point under the cursor stationary
*/

// --- Helpers (verbatim from viewport.js) ---
const ZOOM_MAX = 4.0
const ZOOM_MIN_CAP = 0.05
function effectivePhotoSize(photoMeta, canvasW, canvasH) {
  if (photoMeta && photoMeta.width > 0 && photoMeta.height > 0) {
    return { width: photoMeta.width, height: photoMeta.height }
  }
  return { width: canvasW || 1, height: canvasH || 1 }
}
function photoNormToCanvas(p, viewport, photoSize) {
  return {
    x: p.x * photoSize.width * viewport.zoom + viewport.panX,
    y: p.y * photoSize.height * viewport.zoom + viewport.panY,
  }
}
function canvasToPhotoNorm(c, viewport, photoSize) {
  const denomX = photoSize.width * viewport.zoom || 1
  const denomY = photoSize.height * viewport.zoom || 1
  return { x: (c.x - viewport.panX) / denomX, y: (c.y - viewport.panY) / denomY }
}
function computeFitZoom(photoSize, canvasW, canvasH) {
  if (!canvasW || !canvasH) return 1
  const sx = canvasW / photoSize.width
  const sy = canvasH / photoSize.height
  return Math.max(ZOOM_MIN_CAP, Math.min(sx, sy))
}
function computeFitViewport(photoSize, canvasW, canvasH) {
  const zoom = computeFitZoom(photoSize, canvasW, canvasH)
  const photoCanvasW = photoSize.width * zoom
  const photoCanvasH = photoSize.height * zoom
  return {
    panX: Math.round((canvasW - photoCanvasW) / 2),
    panY: Math.round((canvasH - photoCanvasH) / 2),
    zoom,
  }
}
function clampZoom(z, fitMin = ZOOM_MIN_CAP) {
  if (!Number.isFinite(z)) return 1
  return Math.min(ZOOM_MAX, Math.max(fitMin, z))
}
function clampPan(viewport, photoSize, canvasW, canvasH, minVisibleFraction = 0.1) {
  const photoCanvasW = photoSize.width * viewport.zoom
  const photoCanvasH = photoSize.height * viewport.zoom
  const minVisX = Math.max(1, photoCanvasW * minVisibleFraction)
  const minVisY = Math.max(1, photoCanvasH * minVisibleFraction)
  const minPanX = -photoCanvasW + minVisX
  const maxPanX = canvasW - minVisX
  const minPanY = -photoCanvasH + minVisY
  const maxPanY = canvasH - minVisY
  return {
    panX: Math.min(maxPanX, Math.max(minPanX, viewport.panX)),
    panY: Math.min(maxPanY, Math.max(minPanY, viewport.panY)),
  }
}
function zoomAtCursor(viewport, photoSize, cursor, newZoom) {
  const z = clampZoom(newZoom)
  const denomX = photoSize.width * viewport.zoom || 1
  const denomY = photoSize.height * viewport.zoom || 1
  const photoPtX = (cursor.x - viewport.panX) / denomX
  const photoPtY = (cursor.y - viewport.panY) / denomY
  return {
    panX: Math.round(cursor.x - photoPtX * photoSize.width * z),
    panY: Math.round(cursor.y - photoPtY * photoSize.height * z),
    zoom: z,
  }
}

// --- Tests ---
const tests = []
const pass = (name, cond, extra) => tests.push({ name, ok: !!cond, extra })
const approx = (a, b, tol = 0.5) => Math.abs(a - b) <= tol

// 1. effectivePhotoSize fallback
pass('effectivePhotoSize: no meta -> canvas dims',
  effectivePhotoSize(null, 800, 600).width === 800)
pass('effectivePhotoSize: meta wins',
  effectivePhotoSize({ width: 1920, height: 1080 }, 800, 600).width === 1920)

// 2. photoNormToCanvas + canvasToPhotoNorm round-trip
const v1 = { panX: 50, panY: 30, zoom: 0.5 }
const ps1 = { width: 1920, height: 1080 }
const norm = { x: 0.5, y: 0.25 }
const c1 = photoNormToCanvas(norm, v1, ps1)
pass('photoNormToCanvas: 0.5 of 1920 at zoom 0.5 + panX 50',
  c1.x === 530, { c1 })
pass('photoNormToCanvas: 0.25 of 1080 at zoom 0.5 + panY 30',
  c1.y === 165)
const back = canvasToPhotoNorm(c1, v1, ps1)
pass('canvasToPhotoNorm: round-trip x', approx(back.x, 0.5))
pass('canvasToPhotoNorm: round-trip y', approx(back.y, 0.25))

// 3. computeFitZoom + computeFitViewport
const fitZoom = computeFitZoom({ width: 1920, height: 1080 }, 1280, 720)
pass('computeFitZoom: 1920x1080 in 1280x720 -> 0.6666',
  approx(fitZoom, 1280 / 1920, 0.0001), { fitZoom })
const fitVp = computeFitViewport({ width: 1920, height: 1080 }, 1280, 720)
pass('computeFitViewport: zoom matches fit', approx(fitVp.zoom, fitZoom, 0.0001))
// At fit zoom, photo width = 1920 * (1280/1920) = 1280, so panX = 0; photo height = 720, panY = 0.
pass('computeFitViewport: centered when aspect matches', fitVp.panX === 0)
// Asymmetric: 1920x1080 in 1280x800 -> fit by width (sx<sy), photoH = 720, slack = 80, panY = 40
const fitVpAsym = computeFitViewport({ width: 1920, height: 1080 }, 1280, 800)
pass('computeFitViewport: vertical centering when asymmetric',
  fitVpAsym.panY === 40, { fitVpAsym })

// 4. zoomAtCursor keeps photo point under cursor
const v2 = { panX: 0, panY: 0, zoom: 1 }
const ps2 = { width: 1000, height: 1000 }
const cursor = { x: 200, y: 300 } // photo point (0.2, 0.3) under cursor
const v3 = zoomAtCursor(v2, ps2, cursor, 2.0)
// After zoom, photo point (0.2, 0.3) should still land at canvas (200, 300)
const newCanvasPt = photoNormToCanvas({ x: 0.2, y: 0.3 }, v3, ps2)
pass('zoomAtCursor: photo point under cursor stays under cursor (x)',
  approx(newCanvasPt.x, 200, 1), { newCanvasPt, v3 })
pass('zoomAtCursor: photo point under cursor stays under cursor (y)',
  approx(newCanvasPt.y, 300, 1))
pass('zoomAtCursor: zoom is the requested target', v3.zoom === 2.0)
pass('zoomAtCursor: clamps to ZOOM_MAX',
  zoomAtCursor(v2, ps2, cursor, 10.0).zoom === ZOOM_MAX)

// 5. clampPan keeps ≥10% photo visible
// Photo 1000x1000 at zoom 1 = 1000x1000 canvas px. Canvas = 800x600.
// Min visible = 100x100. So panX must be in [-1000+100, 800-100] = [-900, 700].
const ps5 = { width: 1000, height: 1000 }
const cw5 = 800, ch5 = 600
const farLeft = clampPan({ panX: -2000, panY: 0, zoom: 1 }, ps5, cw5, ch5)
pass('clampPan: limits leftward pan to keep 10% visible',
  farLeft.panX === -900, { farLeft })
const farRight = clampPan({ panX: 5000, panY: 0, zoom: 1 }, ps5, cw5, ch5)
pass('clampPan: limits rightward pan to keep 10% visible',
  farRight.panX === 700)
const inRange = clampPan({ panX: 100, panY: 50, zoom: 1 }, ps5, cw5, ch5)
pass('clampPan: in-range values pass through',
  inRange.panX === 100 && inRange.panY === 50)

// 6. Migration: shape coords stay zoom-stable through commit + render
// Shape committed at canvas px (250, 175) at zoom 0.5, panX 50, panY 30,
// photo 1920x1080. Normalized = (250-50)/(1920*0.5) = 200/960 = 0.2083...
// Render at zoom 1.0, pan 0,0 = 0.2083 * 1920 = 400 canvas px.
const v6 = { panX: 50, panY: 30, zoom: 0.5 }
const ps6 = { width: 1920, height: 1080 }
const shapeNorm = canvasToPhotoNorm({ x: 250, y: 175 }, v6, ps6)
const v7 = { panX: 0, panY: 0, zoom: 1.0 }
const renderPt = photoNormToCanvas(shapeNorm, v7, ps6)
pass('viewport math: shape committed at zoom 0.5 renders correctly at zoom 1',
  approx(renderPt.x, 400, 1) && approx(renderPt.y, 290, 1),
  { renderPt, expected: { x: 400, y: 290 } })

// --- Render summary ---
const root = document.getElementById('summary')
const passCount = tests.filter(t => t.ok).length
const total = tests.length
root.innerHTML = `<div class="row ${passCount === total ? 'pass' : 'fail'}">${passCount}/${total} ${passCount === total ? 'PASS' : 'FAIL'}</div>` +
  tests.map(t => `<div class="row ${t.ok ? 'pass' : 'fail'}">${t.ok ? '✓' : '✗'} ${t.name}${t.extra ? ' ' + JSON.stringify(t.extra) : ''}</div>`).join('')
</script>
</body>
</html>
