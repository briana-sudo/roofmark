<h1>RoofMark — Step 17 Block Test (Save/Load round-trip + Undo capacity + Schema v2 photo round-trip)</h1>
<div class="summary" id="summary"></div>
<script>
/*
  Step 17 block test — pure-JS reproduction of:
    buildExportPayload  — produces JSON-serializable payload from store-shape state
                          (now embeds _photos when slots are present, schema v2)
    parseImportPayload  — validates schemaVersion in {1, 2}, returns the payload
                          (v1 imports continue to work, no _photos on v1)
    suggestedFilename   — "roofmark-project-YYYY-MM-DD-HHMM.json"
    pushUndoCapped      — undo stack with UNDO_LIMIT cap (50)
    deepEqualJSON       — round-trip equality helper

  These are mirrored verbatim in src/store/useAppStore.js so the React
  clone behaves identically.

  Step 17 partial-completion fix (Failure 2): SCHEMA_VERSION bumped to 2.
  v1 imports still accepted (geometry only, no photo). v2 imports may
  carry { _photos: { cropped, source } } — both optional.
*/

const SCHEMA_VERSION = 2
const SUPPORTED_IMPORT_VERSIONS = new Set([1, 2])
const UNDO_LIMIT = 50
const PERSIST_KEYS = [
  'layers', 'sequences', 'clines', 'jobContext',
  'gridSize', 'rightDrawerOpen', 'drawerTab',
  'mode', 'activeLayerId', 'activeSeqId',
  'viewport', 'photoMeta', 'cropMeta',
]

// buildExportPayload now optionally embeds _photos. Pass photos={cropped, source}
// (either may be undefined/null). When both are absent the _photos key is omitted.
function buildExportPayload(state, isoNowFn = () => new Date().toISOString(), photos = null) {
  const slice = {}
  for (const k of PERSIST_KEYS) slice[k] = state[k]
  const payload = {
    schemaVersion: SCHEMA_VERSION,
    exportedAt: isoNowFn(),
    ...slice,
  }
  if (photos && (photos.cropped || photos.source)) {
    payload._photos = {}
    if (typeof photos.cropped === 'string' && photos.cropped.length > 0) payload._photos.cropped = photos.cropped
    if (typeof photos.source  === 'string' && photos.source.length  > 0) payload._photos.source  = photos.source
  }
  return payload
}

function parseImportPayload(jsonText) {
  let obj
  try { obj = typeof jsonText === 'string' ? JSON.parse(jsonText) : jsonText }
  catch (e) { throw new Error('Invalid JSON: ' + (e.message || e)) }
  if (!obj || typeof obj !== 'object') throw new Error('Imported file must be a JSON object.')
  if (typeof obj.schemaVersion !== 'number') throw new Error('Missing schemaVersion field.')
  if (!SUPPORTED_IMPORT_VERSIONS.has(obj.schemaVersion)) {
    throw new Error(`Schema version mismatch: file is v${obj.schemaVersion}, app supports v1, v2.`)
  }
  return obj
}

function pad2(n) { return String(n).padStart(2, '0') }
function suggestedFilename(d = new Date()) {
  const yyyy = d.getFullYear()
  const mm = pad2(d.getMonth() + 1)
  const dd = pad2(d.getDate())
  const hh = pad2(d.getHours())
  const mn = pad2(d.getMinutes())
  return `roofmark-project-${yyyy}-${mm}-${dd}-${hh}${mn}.json`
}

function pushUndoCapped(stack, snapshot) {
  const next = [...stack, snapshot]
  while (next.length > UNDO_LIMIT) next.shift()
  return next
}

function deepEqualJSON(a, b) {
  return JSON.stringify(a) === JSON.stringify(b)
}

// ---- Tests ----

const tests = []
const pass = (name, cond, extra) => tests.push({ name, ok: !!cond, extra })

// 1. buildExportPayload — schemaVersion + exportedAt + all PERSIST_KEYS
const fixedNow = () => '2026-05-05T18:30:00.000Z'
// Tiny synthetic data-URLs for photo round-trip tests. Real photos are
// 1–7 MB; these fakes only need to round-trip as strings, not decode.
const FAKE_CROPPED = 'data:image/jpeg;base64,/9j/CROPPED-FIXTURE'
const FAKE_SOURCE  = 'data:image/jpeg;base64,/9j/SOURCE-FIXTURE'
const stateA = {
  layers: [{ id: 'l1', name: 'Roof', shapes: [] }],
  sequences: [{ id: 's1', title: 'S1', layers: { l1: true }, annotations: [] }],
  clines: [{ id: 'cl1', type: 'h', y: 0.5 }],
  jobContext: { address: '123 Maple St' },
  gridSize: { x: 20, y: 20 },
  rightDrawerOpen: true,
  drawerTab: 'properties',
  mode: 'DRAW',
  activeLayerId: 'l1',
  activeSeqId: null,
  viewport: { panX: 0, panY: 0, zoom: 1 },
  photoMeta: { width: 1920, height: 1080 },
  cropMeta: { x: 0, y: 0, w: 1920, h: 1080, rotation: 0 },
  // NOT in PERSIST_KEYS — should be excluded
  selected: { layerId: 'l1', shapeId: 'sh1' },
  cursorX: 100,
  backgroundImage: { naturalWidth: 1920 }, // also excluded
}
const exported = buildExportPayload(stateA, fixedNow)
pass('export has schemaVersion === 2', exported.schemaVersion === 2)
pass('export has exportedAt timestamp', exported.exportedAt === '2026-05-05T18:30:00.000Z')
pass('export contains layers', deepEqualJSON(exported.layers, stateA.layers))
pass('export contains sequences', deepEqualJSON(exported.sequences, stateA.sequences))
pass('export contains clines', deepEqualJSON(exported.clines, stateA.clines))
pass('export contains jobContext', deepEqualJSON(exported.jobContext, stateA.jobContext))
pass('export contains gridSize', deepEqualJSON(exported.gridSize, stateA.gridSize))
pass('export contains rightDrawerOpen', exported.rightDrawerOpen === true)
pass('export contains drawerTab', exported.drawerTab === 'properties')
pass('export contains mode', exported.mode === 'DRAW')
pass('export contains activeLayerId', exported.activeLayerId === 'l1')
pass('export contains activeSeqId', exported.activeSeqId === null)
pass('export contains viewport', deepEqualJSON(exported.viewport, stateA.viewport))
pass('export contains photoMeta', deepEqualJSON(exported.photoMeta, stateA.photoMeta))
pass('export contains cropMeta', deepEqualJSON(exported.cropMeta, stateA.cropMeta))
pass('export EXCLUDES selected (transient)', !('selected' in exported))
pass('export EXCLUDES cursorX (transient)', !('cursorX' in exported))
pass('export EXCLUDES backgroundImage (binary)', !('backgroundImage' in exported))
// v2 — _photos is omitted when no photos passed in (project never had one)
pass('export OMITS _photos when no photos provided', !('_photos' in exported))

// 2. JSON.stringify produces parseable text + round-trip
const text = JSON.stringify(exported, null, 2)
const reparsed = JSON.parse(text)
pass('JSON serializes to a string', typeof text === 'string' && text.length > 100)
pass('JSON round-trips via stringify/parse', deepEqualJSON(reparsed, exported))

// 3. parseImportPayload — happy path (v2)
const imported = parseImportPayload(text)
pass('parseImportPayload accepts valid v2 JSON', imported.schemaVersion === 2)
pass('parseImportPayload preserves all PERSIST_KEYS', PERSIST_KEYS.every(k => deepEqualJSON(imported[k], stateA[k])))

// 3b. v1 imports continue to work (backward-compat)
const v1Payload = JSON.stringify({
  schemaVersion: 1,
  exportedAt: '2026-05-04T10:00:00.000Z',
  layers: stateA.layers,
  sequences: stateA.sequences,
  clines: stateA.clines,
  jobContext: stateA.jobContext,
  gridSize: stateA.gridSize,
  rightDrawerOpen: stateA.rightDrawerOpen,
  drawerTab: stateA.drawerTab,
  mode: stateA.mode,
  activeLayerId: stateA.activeLayerId,
  activeSeqId: stateA.activeSeqId,
  viewport: stateA.viewport,
  photoMeta: stateA.photoMeta,
  cropMeta: stateA.cropMeta,
})
const v1Imported = parseImportPayload(v1Payload)
pass('parseImportPayload accepts valid v1 JSON (backward-compat)', v1Imported.schemaVersion === 1)
pass('v1 import preserves all PERSIST_KEYS', PERSIST_KEYS.every(k => deepEqualJSON(v1Imported[k], stateA[k])))
pass('v1 import has no _photos (geometry only)', !('_photos' in v1Imported))

// 4. parseImportPayload — schema v3 (unknown future) rejected
try {
  parseImportPayload(JSON.stringify({ schemaVersion: 3, layers: [] }))
  pass('schema v3 rejected with throw', false)
} catch (e) {
  pass('schema v3 rejected with throw', /v3.*v1.*v2|mismatch/i.test(e.message), { msg: e.message })
}

// 5. parseImportPayload — missing schemaVersion rejected
try {
  parseImportPayload(JSON.stringify({ layers: [] }))
  pass('missing schemaVersion rejected', false)
} catch (e) {
  pass('missing schemaVersion rejected', /missing schemaversion/i.test(e.message))
}

// 6. parseImportPayload — invalid JSON rejected
try {
  parseImportPayload('this is not json {')
  pass('invalid JSON rejected with throw', false)
} catch (e) {
  pass('invalid JSON rejected with throw', /invalid json/i.test(e.message))
}

// 7. parseImportPayload — non-object (e.g. array) rejected
try {
  parseImportPayload(JSON.stringify([1, 2, 3]))
  pass('JSON array rejected (must be object)', false)
} catch (e) {
  pass('JSON array rejected (must be object)', /missing schemaversion/i.test(e.message))
}

// 8. suggestedFilename format
const d = new Date(2026, 4, 5, 18, 30) // May 5 2026, 18:30 local
const fn = suggestedFilename(d)
pass('filename matches roofmark-project-YYYY-MM-DD-HHMM.json',
  /^roofmark-project-2026-05-05-1830\.json$/.test(fn), { fn })
pass('filename uses zero-padded month/day/hour/minute',
  suggestedFilename(new Date(2026, 0, 1, 0, 5)).includes('2026-01-01-0005'))

// 9. Round-trip: export -> stringify -> parse -> import -> deep equal
const roundTripped = parseImportPayload(JSON.stringify(buildExportPayload(stateA, fixedNow)))
for (const k of PERSIST_KEYS) {
  pass(`round-trip preserves ${k}`, deepEqualJSON(roundTripped[k], stateA[k]))
}

// 9b. v2 photo round-trip — both slots embedded
const withBoth = buildExportPayload(stateA, fixedNow, { cropped: FAKE_CROPPED, source: FAKE_SOURCE })
pass('export embeds _photos when provided', !!withBoth._photos)
pass('export _photos.cropped matches input', withBoth._photos.cropped === FAKE_CROPPED)
pass('export _photos.source matches input', withBoth._photos.source === FAKE_SOURCE)
const rtBoth = parseImportPayload(JSON.stringify(withBoth))
pass('v2 round-trip preserves _photos.cropped', rtBoth._photos.cropped === FAKE_CROPPED)
pass('v2 round-trip preserves _photos.source', rtBoth._photos.source === FAKE_SOURCE)

// 9c. v2 partial photo — cropped only (source absent — re-crop disabled scenario)
const croppedOnly = buildExportPayload(stateA, fixedNow, { cropped: FAKE_CROPPED, source: null })
pass('export with cropped-only includes cropped', croppedOnly._photos.cropped === FAKE_CROPPED)
pass('export with cropped-only omits source field', !('source' in (croppedOnly._photos || {})))

// 9d. v2 explicit-empty photos — _photos omitted entirely (no orphan empty object)
const noPhotos = buildExportPayload(stateA, fixedNow, { cropped: null, source: null })
pass('export with both null photos OMITS _photos entirely', !('_photos' in noPhotos))

// 9e-pre. Phase B (Gap 2) — extended dataSnapshot scope.
// Mirror of useAppStore.js dataSnapshot. Photo metadata (photoMeta +
// cropMeta + hasSourcePhoto) included so undo can detect a photo
// boundary crossing. backgroundImage NOT included (HTMLImageElement is
// not JSON-serializable; the binary lives in IDB and is restored
// separately via _undo slots).
function buildExtendedSnapshot(state) {
  return JSON.stringify({
    layers: state.layers,
    sequences: state.sequences,
    clines: state.clines,
    photoMeta: state.photoMeta || null,
    cropMeta: state.cropMeta || null,
    hasSourcePhoto: !!state.hasSourcePhoto,
  })
}
const snapWithPhoto = JSON.parse(buildExtendedSnapshot(stateA))
pass('extended snapshot includes photoMeta', snapWithPhoto.photoMeta !== undefined && deepEqualJSON(snapWithPhoto.photoMeta, stateA.photoMeta))
pass('extended snapshot includes cropMeta',  snapWithPhoto.cropMeta  !== undefined && deepEqualJSON(snapWithPhoto.cropMeta,  stateA.cropMeta))
pass('extended snapshot includes hasSourcePhoto field', 'hasSourcePhoto' in snapWithPhoto)
pass('extended snapshot OMITS backgroundImage (not serializable)', !('backgroundImage' in snapWithPhoto))
pass('extended snapshot preserves layers/sequences/clines',
  deepEqualJSON(snapWithPhoto.layers, stateA.layers)
  && deepEqualJSON(snapWithPhoto.sequences, stateA.sequences)
  && deepEqualJSON(snapWithPhoto.clines, stateA.clines))

// State without photo — snapshot should normalize to nulls/false.
const stateNoPhoto = { layers: [], sequences: [], clines: [], photoMeta: null, cropMeta: null, hasSourcePhoto: false }
const snapNoPhoto = JSON.parse(buildExtendedSnapshot(stateNoPhoto))
pass('snapshot without photo: photoMeta is null', snapNoPhoto.photoMeta === null)
pass('snapshot without photo: hasSourcePhoto is false', snapNoPhoto.hasSourcePhoto === false)

// 9e-mid. Phase B (Gap 2) — preWipeCopy + restoreFromUndo IDB lifecycle.
// Mirror of captureAndBackupPhoto + restorePhotoFromUndo logic from
// useAppStore.js. Uses a synchronous fake-IDB Map (the test verifies
// data flow, not the async machinery — Promise wrapping would only add
// timing risk that delays assertions past the render summary).
function makeFakeIDB(initial = {}) {
  const store = new Map(Object.entries(initial))
  return {
    save: (val, key) => { store.set(key, val) },
    load: (key) => store.get(key) ?? null,
    clear: (key) => { store.delete(key) },
    snapshot: () => Object.fromEntries(store),
  }
}
function fakePreWipeCopy(idb) {
  const oldCropped = idb.load('cropped')
  const oldSource = idb.load('source')
  if (oldCropped) idb.save(oldCropped, 'cropped_undo'); else idb.clear('cropped_undo')
  if (oldSource)  idb.save(oldSource,  'source_undo');  else idb.clear('source_undo')
}
function fakeRestoreFromUndo(idb) {
  const croppedBackup = idb.load('cropped_undo')
  const sourceBackup  = idb.load('source_undo')
  if (croppedBackup) idb.save(croppedBackup, 'cropped'); else idb.clear('cropped')
  if (sourceBackup)  idb.save(sourceBackup,  'source');  else idb.clear('source')
  idb.clear('cropped_undo')
  idb.clear('source_undo')
  return { cropped: croppedBackup, source: sourceBackup }
}

// 9e-1. preWipeCopy with photo present — copies live to _undo
{
  const idb = makeFakeIDB({ cropped: 'A_cropped', source: 'A_source' })
  fakePreWipeCopy(idb)
  const snap = idb.snapshot()
  pass('preWipeCopy: cropped_undo populated from live cropped', snap.cropped_undo === 'A_cropped')
  pass('preWipeCopy: source_undo populated from live source',  snap.source_undo === 'A_source')
  pass('preWipeCopy: live cropped UNCHANGED', snap.cropped === 'A_cropped')
  pass('preWipeCopy: live source UNCHANGED',  snap.source === 'A_source')
}

// 9e-2. preWipeCopy with no live photo — clears _undo (first-time upload)
{
  const idb = makeFakeIDB({})
  fakePreWipeCopy(idb)
  const snap = idb.snapshot()
  pass('preWipeCopy with no live: cropped_undo absent', snap.cropped_undo === undefined)
  pass('preWipeCopy with no live: source_undo absent',  snap.source_undo === undefined)
}

// 9e-3. Full clear cycle: preWipeCopy → wipe → restore from _undo
{
  const idb = makeFakeIDB({ cropped: 'A_cropped', source: 'A_source' })
  fakePreWipeCopy(idb)
  idb.clear('cropped')
  idb.clear('source')
  pass('post-wipe: live cropped gone', idb.snapshot().cropped === undefined)
  pass('post-wipe: live source gone',  idb.snapshot().source === undefined)
  const restored = fakeRestoreFromUndo(idb)
  pass('restore: returned cropped matches pre-wipe', restored.cropped === 'A_cropped')
  pass('restore: returned source matches pre-wipe',  restored.source === 'A_source')
  const final = idb.snapshot()
  pass('restore: live cropped re-populated', final.cropped === 'A_cropped')
  pass('restore: live source re-populated',  final.source === 'A_source')
  pass('restore: cropped_undo consumed',     final.cropped_undo === undefined)
  pass('restore: source_undo consumed',      final.source_undo === undefined)
}

// 9e-4. Replace cycle: preWipeCopy → write new → restore old via _undo
{
  const idb = makeFakeIDB({ cropped: 'A_cropped', source: 'A_source' })
  fakePreWipeCopy(idb)
  idb.save('B_cropped', 'cropped')
  idb.save('B_source', 'source')
  pass('replace: live now has new B_cropped', idb.snapshot().cropped === 'B_cropped')
  fakeRestoreFromUndo(idb)
  pass('replace+undo: live restored to A_cropped', idb.snapshot().cropped === 'A_cropped')
  pass('replace+undo: live restored to A_source',  idb.snapshot().source === 'A_source')
}

// 9e-5. Backup-of-backup limit: rapid wipe-twice — second wipe overwrites
// first backup. Only B is recoverable, A is gone. (Documented limit.)
{
  const idb = makeFakeIDB({ cropped: 'A_cropped', source: 'A_source' })
  fakePreWipeCopy(idb) // _undo = A
  pass('backup-of-backup setup: _undo = A', idb.snapshot().cropped_undo === 'A_cropped')
  // Simulate first wipe → replace with B
  idb.save('B_cropped', 'cropped')
  idb.save('B_source', 'source')
  // Second wipe: preWipeCopy reads live (B) and overwrites _undo (A → B). A is GONE.
  fakePreWipeCopy(idb)
  pass('backup-of-backup: _undo overwritten with B (A gone)', idb.snapshot().cropped_undo === 'B_cropped')
  // Replace with C
  idb.save('C_cropped', 'cropped')
  idb.save('C_source', 'source')
  // First undo recovers B
  const restored = fakeRestoreFromUndo(idb)
  pass('backup-of-backup: first undo recovers B', restored.cropped === 'B_cropped')
  pass('backup-of-backup: A is permanently gone (consumed slot empty)',
    idb.snapshot().cropped_undo === undefined)
  // Subsequent restore would return null/null — operator hits limit
  const restored2 = fakeRestoreFromUndo(idb)
  pass('backup-of-backup: second undo returns no backup', restored2.cropped == null && restored2.source == null)
}

// 9e-6. App-load clear: _undo slots wiped on app start regardless of contents.
{
  const idb = makeFakeIDB({
    cropped: 'live_cropped', source: 'live_source',
    cropped_undo: 'leftover_undo_cropped', source_undo: 'leftover_undo_source',
  })
  // Mirror of useAppStore.js app-load block: clear _undo slots.
  idb.clear('cropped_undo')
  idb.clear('source_undo')
  const snap = idb.snapshot()
  pass('app-load: cropped_undo cleared', snap.cropped_undo === undefined)
  pass('app-load: source_undo cleared',  snap.source_undo === undefined)
  pass('app-load: live cropped UNTOUCHED', snap.cropped === 'live_cropped')
  pass('app-load: live source UNTOUCHED',  snap.source === 'live_source')
}

// 9e-7. Photo-boundary detection logic (mirror of undo handler).
function photoChanged(cur, next) {
  return JSON.stringify(cur.photoMeta || null) !== JSON.stringify(next.photoMeta || null)
    || JSON.stringify(cur.cropMeta  || null) !== JSON.stringify(next.cropMeta  || null)
    || (!!cur.hasSourcePhoto) !== (!!next.hasSourcePhoto)
}
pass('photoChanged: identical states → false',
  photoChanged({ photoMeta: { width: 1, height: 1 }, cropMeta: null, hasSourcePhoto: true },
               { photoMeta: { width: 1, height: 1 }, cropMeta: null, hasSourcePhoto: true }) === false)
pass('photoChanged: different photoMeta → true',
  photoChanged({ photoMeta: { width: 1, height: 1 }, cropMeta: null, hasSourcePhoto: true },
               { photoMeta: { width: 2, height: 2 }, cropMeta: null, hasSourcePhoto: true }) === true)
pass('photoChanged: photo cleared (null vs object) → true',
  photoChanged({ photoMeta: null, cropMeta: null, hasSourcePhoto: false },
               { photoMeta: { width: 1, height: 1 }, cropMeta: null, hasSourcePhoto: true }) === true)
pass('photoChanged: hasSourcePhoto flipped → true',
  photoChanged({ photoMeta: { width: 1, height: 1 }, cropMeta: null, hasSourcePhoto: false },
               { photoMeta: { width: 1, height: 1 }, cropMeta: null, hasSourcePhoto: true }) === true)

// 9e. Photo tab gate logic (Step 17 partial-completion #2, Gap 1).
// Mirrors useAppStore.js VALID_DRAWER_TABS + App.jsx effectiveDrawerTab
// fallback. Photo tab visible whenever photoMeta is truthy; if persisted
// drawerTab is 'photo' but photoMeta is null, fall back to 'properties'.
const VALID_DRAWER_TABS = new Set(['properties', 'sequences', 'annotations', 'photo'])
function effectiveDrawerTabFor({ drawerTab, mode, activeSeqId, photoMeta }) {
  const showAnnotationsTab = mode === 'SEQUENCE' && !!activeSeqId
  const showPhotoTab = !!photoMeta
  if (drawerTab === 'annotations' && !showAnnotationsTab) return 'properties'
  if (drawerTab === 'photo' && !showPhotoTab) return 'properties'
  return drawerTab
}
pass('VALID_DRAWER_TABS contains photo', VALID_DRAWER_TABS.has('photo'))
pass('photo tab valid with photoMeta truthy',
  effectiveDrawerTabFor({ drawerTab: 'photo', mode: 'DRAW', activeSeqId: null, photoMeta: { width: 100, height: 100 } }) === 'photo')
pass('photo tab falls back to properties when photoMeta is null',
  effectiveDrawerTabFor({ drawerTab: 'photo', mode: 'DRAW', activeSeqId: null, photoMeta: null }) === 'properties')
pass('photo tab visible in EDIT mode with photo loaded',
  effectiveDrawerTabFor({ drawerTab: 'photo', mode: 'EDIT', activeSeqId: null, photoMeta: { width: 1, height: 1 } }) === 'photo')
pass('photo tab visible in SEQUENCE mode with photo loaded',
  effectiveDrawerTabFor({ drawerTab: 'photo', mode: 'SEQUENCE', activeSeqId: 's1', photoMeta: { width: 1, height: 1 } }) === 'photo')
pass('annotations tab still falls back without active sequence',
  effectiveDrawerTabFor({ drawerTab: 'annotations', mode: 'SEQUENCE', activeSeqId: null, photoMeta: null }) === 'properties')

// 9f. Bug A — clearAll + importJSON stack hygiene (cross-project undo
// bleed prevention). Mirror of useAppStore.js clearAll + importJSON
// post-fix. clearAll wipes both stacks; importJSON keeps a single
// pre-import snapshot so "Cmd+Z to undo my Load" works but second
// Cmd+Z is a no-op.
function applyClearAll(state) {
  // Mirror of clearAll in useAppStore.js — Bug A version (no pushUndo,
  // stacks wiped).
  return {
    ...state,
    layers: [],
    sequences: [],
    clines: [],
    activeLayerId: null,
    activeSeqId: null,
    backgroundImage: null,
    photoMeta: null,
    cropMeta: null,
    hasSourcePhoto: false,
    undoStack: [],
    redoStack: [],
    photoUndoSlotInitialized: false,
  }
}
function applyImportJSON(state, importedSlice) {
  // Mirror of importJSON Bug A version: capture pre-import snapshot,
  // apply imported state, replace undoStack with [snapshot] + clear
  // redoStack.
  const preImportSnapshot = JSON.stringify({
    layers: state.layers, sequences: state.sequences, clines: state.clines,
    photoMeta: state.photoMeta || null, cropMeta: state.cropMeta || null,
    hasSourcePhoto: !!state.hasSourcePhoto,
  })
  return {
    ...state,
    ...importedSlice,
    undoStack: [preImportSnapshot],
    redoStack: [],
  }
}

// Setup: a state with populated stacks + content
const populatedState = {
  layers: [{ id: 'l1', name: 'Roof', shapes: [{ id: 'sh1', type: 'rect', pts: [{x:0.1,y:0.1},{x:0.9,y:0.1},{x:0.9,y:0.9},{x:0.1,y:0.9}] }] }],
  sequences: [{ id: 's1', annotations: [] }],
  clines: [{ id: 'cl1', type: 'h', y: 0.5 }],
  activeLayerId: 'l1',
  photoMeta: { width: 1920, height: 1080 },
  cropMeta: { x: 0, y: 0, w: 1920, h: 1080, rotation: 0 },
  hasSourcePhoto: true,
  undoStack: ['snap-A', 'snap-B', 'snap-C'], // 3 prior snapshots
  redoStack: ['redo-X'],
  photoUndoSlotInitialized: true,
}

// 9f-1. clearAll wipes both stacks
const cleared = applyClearAll(populatedState)
pass('Bug A — clearAll: layers wiped', cleared.layers.length === 0)
pass('Bug A — clearAll: sequences wiped', cleared.sequences.length === 0)
pass('Bug A — clearAll: clines wiped', cleared.clines.length === 0)
pass('Bug A — clearAll: photoMeta wiped', cleared.photoMeta === null)
pass('Bug A — clearAll: undoStack EMPTY (no cross-project bleed)', cleared.undoStack.length === 0)
pass('Bug A — clearAll: redoStack EMPTY', cleared.redoStack.length === 0)
pass('Bug A — clearAll: photoUndoSlotInitialized = false', cleared.photoUndoSlotInitialized === false)

// 9f-2. importJSON keeps single pre-import snapshot, clears redoStack
const afterImport = applyImportJSON(populatedState, {
  layers: [{ id: 'l99', name: 'Loaded', shapes: [] }],
  sequences: [],
  clines: [],
  photoMeta: { width: 800, height: 600 },
  cropMeta: { x: 0, y: 0, w: 800, h: 600, rotation: 0 },
  hasSourcePhoto: false,
})
pass('Bug A — importJSON: imported layers applied', afterImport.layers[0].id === 'l99')
pass('Bug A — importJSON: undoStack length === 1 (only pre-import snapshot)', afterImport.undoStack.length === 1)
pass('Bug A — importJSON: redoStack EMPTY', afterImport.redoStack.length === 0)

// 9f-3. The single undoStack entry contains the pre-import state
const reparsedSnap = JSON.parse(afterImport.undoStack[0])
pass('Bug A — importJSON: pre-import snapshot has populated layers', reparsedSnap.layers.length === 1)
pass('Bug A — importJSON: pre-import snapshot preserves shape', deepEqualJSON(reparsedSnap.layers, populatedState.layers))
pass('Bug A — importJSON: pre-import snapshot preserves clines', deepEqualJSON(reparsedSnap.clines, populatedState.clines))
pass('Bug A — importJSON: pre-import snapshot preserves photoMeta', deepEqualJSON(reparsedSnap.photoMeta, populatedState.photoMeta))

// 9f-4. Simulating "second Cmd+Z after Load" — pop the only entry,
// stack becomes empty, button auto-disables.
const afterFirstUndo = { ...afterImport, undoStack: afterImport.undoStack.slice(0, -1) }
pass('Bug A — Load + 1st undo: undoStack EMPTY (button disables)', afterFirstUndo.undoStack.length === 0)

// 9f-5. clearAll + Cmd+Z attempted — undoStack remains empty, button stays disabled
pass('Bug A — clearAll + attempted undo: stack stays empty', cleared.undoStack.length === 0)
pass('Bug A — undo button disable condition (length===0) holds after clearAll', (cleared.undoStack.length === 0))

// 10. pushUndoCapped — capacity test (50)
let stack = []
for (let i = 0; i < 60; i++) {
  stack = pushUndoCapped(stack, `snap-${i}`)
}
pass('undo stack capped at 50 after 60 pushes', stack.length === 50)
pass('oldest snapshots dropped (snap-9 is the new floor)', stack[0] === 'snap-10')
pass('newest snapshot retained at top', stack[stack.length - 1] === 'snap-59')

// Console clean check
let consoleClean = true
const origErr = console.error
console.error = (...a) => { consoleClean = false; origErr.apply(console, a) }
buildExportPayload(stateA)
parseImportPayload(JSON.stringify(buildExportPayload(stateA)))
console.error = origErr
pass('no console.error during normal export/import', consoleClean)

// ---- Render summary ----
const root = document.getElementById('summary')
const passCount = tests.filter(t => t.ok).length
const total = tests.length
root.innerHTML = `<div class="row ${passCount === total ? 'pass' : 'fail'}">${passCount}/${total} ${passCount === total ? 'PASS' : 'FAIL'}</div>` +
  tests.map(t => `<div class="row ${t.ok ? 'pass' : 'fail'}">${t.ok ? '✓' : '✗'} ${t.name}${t.extra ? ' ' + JSON.stringify(t.extra) : ''}</div>`).join('')
</script>
